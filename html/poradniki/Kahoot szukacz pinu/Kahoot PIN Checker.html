<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kahoot PIN Checker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            font-size: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 20px;
        }

        #result {
            margin-top: 20px;
            font-size: 24px;
        }
        .SprawdzPinKahoot {
            margin-right: 220px;
        }
        fieldset {
            border: 2px solid darkblue;
            float: left;
            height: 460px;
            width: 190px;
            margin-left: 50px;
            overflow: auto;
            font-size: 20px;
        }
        legend {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: blue;
        }
        </style>
</head>
<body>
    <fieldset>
        <legend>Aktywne piny</legend>
        <p id="activePins"></p>
    </fieldset>
    <section class="SprawdzPinKahoot">
        <h1>Sprawdź PIN Kahoot</h1>
        <input id="pinPoj" placeholder="Wpisz PIN"><br>
        <button onclick="checkPin()">Szukaj aktywnych pinów</button>
        <button onclick="checkPinPoj()">Sprawdź czy pin działa</button><br>
        <div id="result"></div>
    </section><br>
    <script>
        async function checkPin() {
            let pin = 100000;
            const koniec = 9999999;
            // const generator = setInterval(() => {
            //     if (pin <= koniec) {
            //         // Wypisujemy liczbę
            //         console.log(pin);
            //         pin++;
            //     } 
            //     else {
            //         // Zatrzymujemy, gdy licznik dobije do końca
            //         clearInterval(generator);
            //         console.log("Zakończono generowanie.");
            //     }
            // }, 1); // 1 ms opóźnienia
            for(let i = pin; i <= koniec; i++){
                const url = "https://kahoot.it/reserve/session/" + i
                try {
                    const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(url))
                    if (res.status === 200) {
                        const data = await res.json()
                        document.getElementById("activePins").innerHTML += i + "<BR>";
                    } 
                } 
                catch (e) {
                    document.getElementById("activePins").innerHTML = "⚠️ Błąd sprawdzania"
                }
            }
        }
        async function checkPinPoj() {
            const pinPoj = document.getElementById("pinPoj").value
            if (pinPoj != "") {
                const url = "https://kahoot.it/reserve/session/" + pinPoj
                try {
                    const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(url))
                    if (res.status === 200) {
                        const data = await res.json()
                        // document.getElementById("result").innerHTML = "✅ PIN istnieje<br>Nazwa quizu: " + data.name
                        document.getElementById("result").innerHTML = "✅ PIN jest aktywny"
                    } 
                    else {
                        document.getElementById("result").innerHTML = "❌ PIN nie istnieje"
                    }
                } 
                catch (e) {
                    document.getElementById("result").innerHTML = "⚠️ Błąd sprawdzania"
                }
            }
        }
    </script>
</body>
</html>
