<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dane z innej strony</title>
</head>
<body>

    <h2>Dane z innej strony:</h2>
    <!-- Miejsce, w którym pojawi się załadowana treść -->
    <div id="content-container">Ładowanie...</div>

    <script>
        // URL strony zewnętrznej
        const targetUrl = 'https://www.aliorbank.pl/'; 
        // Selektor CSS elementu, który chcesz pobrać (np. id: #element, class: .element)
        const selectorToGet = '.hero-carousel-slide-title'; 

        fetch(targetUrl)
            .then(response => response.text())
            .then(html => {
                // Konwersja tekstu na obiekt DOM
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Wyszukanie konkretnego elementu
                const element = doc.querySelector(selectorToGet);
                
                if (element) {
                    document.getElementById('content-container').innerHTML = element.innerHTML;
                } else {
                    document.getElementById('content-container').innerHTML = 'Nie znaleziono elementu.';
                }
            })
            .catch(error => {
                console.error('Błąd:', error);
                document.getElementById('content-container').innerHTML = 'Błąd ładowania danych (możliwy CORS).';
            });
    </script>
</body>
</html>
